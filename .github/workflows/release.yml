name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: qi
            archive: qi-${{ github.ref_name }}-macos-arm64.tar.gz

          - os: macos-13
            target: x86_64-apple-darwin
            artifact: qi
            archive: qi-${{ github.ref_name }}-macos-x64.tar.gz

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: qi
            archive: qi-${{ github.ref_name }}-linux-x64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: qi.exe
            archive: qi-${{ github.ref_name }}-windows-x64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} qi
          tar czf ${{ matrix.archive }} qi
          rm qi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item target\${{ matrix.target }}\release\${{ matrix.artifact }} qi.exe
          Compress-Archive -Path qi.exe -DestinationPath ${{ matrix.archive }}
          Remove-Item qi.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*

      - name: Trigger installer build
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          repository: qilang-project/qi-installer
          event-type: qi-released
          client-payload: '{"version": "${{ github.ref_name }}"}'
